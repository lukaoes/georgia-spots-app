services:
  vanlife-backend:
    build: .
    container_name: vanlife-backend
    restart: unless-stopped
    # Host port 4001 (adjust if that's already used by something else on your server) mapped to
    # the container's internal 4000, so you can also reach it directly at
    # http://192.168.100.11:4001 for local testing without going through the tunnel.
    ports:
      - "4001:4000"
    volumes:
      # SQLite lives here so it survives container rebuilds/updates. CasaOS convention is to
      # keep app data under /DATA/AppData/<app-name> - create this folder first (see steps).
      - /DATA/AppData/vanlife-backend/data:/data
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/data/data.sqlite
      - FRONTEND_ORIGIN=https://georgia-spots-app.vercel.app
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - WATERMARK_TEXT=vanlife.ge
    networks:
      - vanlife-net

  # Quick Tunnel: gives this backend a free public HTTPS URL (like https://random-words
  # .trycloudflare.com) with no domain and no Cloudflare dashboard setup needed. The URL prints
  # in this container's logs - check it with `docker compose logs vanlife-cloudflared`.
  # Trade-off: the URL isn't permanent - if this container restarts (server reboot, update,
  # etc.), Cloudflare generates a new random URL, and vercel.json's rewrite destination needs
  # updating to match. Fine for a personal project, just don't expect it to never change.
  vanlife-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vanlife-cloudflared
    restart: unless-stopped
    command: tunnel --url http://vanlife-backend:4000 --no-autoupdate
    networks:
      - vanlife-net
    depends_on:
      - vanlife-backend

networks:
  vanlife-net:
    driver: bridge
